name: Partnership inquiry (prime / integrator)
description: Request evaluation access, teaming, or commercial licensing for RADR
title: "[Partnership] "
labels: ["partnership"]
body:
  - type: markdown
    value: |
      Use this form for **prime contractor**, **integrator**, or **government lab** teaming interest.
      Public repo use is covered by the [MIT License](../LICENSE).
      Production and Program rights are under [LICENSE-COMMERCIAL.md](../LICENSE-COMMERCIAL.md).

      See also: [Licensing & partnership guide](../docs/licensing-and-partnership.md).

  - type: input
    id: organization
    attributes:
      label: Organization
      description: Legal company or lab name
    validations:
      required: true

  - type: dropdown
    id: tier
    attributes:
      label: Desired engagement tier
      options:
        - Evaluation (internal trade study / capture)
        - Development (prototype / test under PCA)
        - Production (manufacture for named Program)
    validations:
      required: true

  - type: textarea
    id: program
    attributes:
      label: Program or customer context
      description: e.g. Army counter-UAS prototype, OTA topic, internal IR&D — no classified detail in this public issue
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope of interest
      description: Launcher, round, seeker integration, motor/warhead, full system, etc.
    validations:
      required: true

  - type: textarea
    id: timeline
    attributes:
      label: Timeline
      description: Target quarter or event (industry day, proposal due date)
    validations:
      required: false

  - type: input
    id: contact
    attributes:
      label: Business contact (name + email)
      description: We will follow up via email for NDA / PCA if appropriate
    validations:
      required: true

  - type: checkboxes
    id: ack
    attributes:
      label: Acknowledgements
      options:
        - label: I understand repository content is notional Phase 0 material and not procurement authority
          required: true
        - label: I understand export-controlled data must not be posted in this public issue
          required: true
